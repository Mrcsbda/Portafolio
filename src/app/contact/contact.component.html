<main class="contact-container">
  <div class="form-container">
    <h1 class="title">Contáctame.</h1>
    <hr />
    <form action="https://formspree.io/f/meqwaqke" method="POST">
      <input name="name" type="text" placeholder="Nombre completo" required/>
      <input name="number" type="number" placeholder="Número telefónico" required/>
      <input name="email" type="email" placeholder="Correo Electrónico" required/>
      <textarea name="message" placeholder="¡Dejame un mensaje!" required></textarea>
      <button type="submit">Enviar</button>
    </form>
  </div>
  <div class="illustration-container">
    <img src="../../assets/contact/contacto.svg" alt="woman illustration">
  </div>
</main>
